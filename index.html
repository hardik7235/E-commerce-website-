<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhaga Piroi - Login & Signup</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { 
            margin: 0;
            padding: 0;
            background-color: #000000; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        .right-panel-bg {
            background-color: #0a0a0a;
            border-left: 1px solid #262626;
        }

        .auth-input {
            background-color: #121212; 
            border: 1px solid #363636; 
            border-radius: 6px;
            padding: 14px 16px; 
            font-size: 14px; 
            color: #ffffff; 
            width: 100%; 
            outline: none;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }
        .auth-input::placeholder { color: #737373; }
        .auth-input:focus { border-color: #555555; }

        .btn-action-primary {
            background-color: #0064e0;
            color: #ffffff; 
            font-weight: 600; 
            padding: 14px 16px;
            border-radius: 9999px; 
            font-size: 14px; 
            width: 100%; 
            border: none; 
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s ease;
        }
        .btn-action-primary:hover { background-color: #0057c2; }

        .btn-action-secondary {
            background-color: transparent; 
            color: #0095f6; 
            font-weight: 600; 
            padding: 14px 16px;
            border-radius: 9999px;
            border: 1px solid #363636;
            font-size: 14px; 
            width: 100%; 
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-action-secondary:hover { border-color: #555555; color: #ffffff; }

        .text-gradient-custom {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Form Transition Logic */
        .form-transition-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .form-view-section {
            width: 100%;
            position: absolute;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateX(20px);
            pointer-events: none;
            visibility: hidden;
        }
        .form-view-section.is-active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
            position: relative;
            visibility: visible;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slowZoomEffect {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        
        .animate-zoom-bg { animation: slowZoomEffect 20s alternate infinite ease-in-out; }
        .animate-text-reveal-1 { animation: slideUpFade 0.8s ease-out 0.3s forwards; opacity: 0; }
        .animate-text-reveal-2 { animation: slideUpFade 0.8s ease-out 0.6s forwards; opacity: 0; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen w-full bg-black overflow-hidden">

    <section id="hero-section" class="hidden md:block w-1/2 h-full relative overflow-hidden bg-black flex-shrink-0">
        <div class="absolute inset-0 bg-black/60 z-10" aria-hidden="true"></div>
        <div class="absolute inset-0 z-20 flex flex-col justify-center items-center p-8 xl:p-12 text-center pointer-events-none">
            <h1 class="text-[32px] lg:text-[38px] xl:text-[44px] font-semibold text-white leading-[1.2] tracking-tight">
                <span class="animate-text-reveal-1 inline-block">Welcome to Dhaga piroi</span> <br />
                <span class="text-gradient-custom font-bold mt-4 animate-text-reveal-2 inline-block text-[20px] lg:text-[24px] xl:text-[28px]">
                    Handmade with Love, Threaded with Passion
                </span>
            </h1>
        </div>
        <img src="hero.jpeg" alt="Background" class="w-full h-full object-cover animate-zoom-bg" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200&auto=format&fit=crop';">
    </section>

    <section id="auth-panel" class="w-full h-full md:w-1/2 right-panel-bg flex flex-col justify-center items-center p-6 sm:p-10">
        <div class="w-full max-w-[360px]">
            <div class="form-transition-wrapper">
                
                <!-- LOGIN FORM -->
                <div id="login-form-view" class="form-view-section is-active">
                    <h2 class="text-[20px] font-semibold text-white mb-6 text-center">Log in</h2>
                    
                    <form onsubmit="handleAuthSubmit(event, 'Login')" class="w-full">
                        <input type="text" id="login-identifier" placeholder="Mobile number, username or email" class="auth-input" required>
                        <input type="password" id="login-password" placeholder="Password" class="auth-input" required>
                        <button type="submit" class="btn-action-primary mt-2">Log in</button>
                    </form>

                    <div class="flex items-center my-6 w-full">
                        <div class="flex-grow h-px bg-[#363636]"></div>
                        <span class="px-4 text-xs font-semibold text-[#737373] uppercase tracking-widest">or</span>
                        <div class="flex-grow h-px bg-[#363636]"></div>
                    </div>

                    <button type="button" onclick="switchAuthView('signup')" class="btn-action-secondary">Sign Up</button>
                </div>

                <!-- SIGN UP FORM -->
                <div id="signup-form-view" class="form-view-section">
                    <h2 class="text-[20px] font-semibold text-white mb-6 text-center">Sign up</h2>
                    
                    <form onsubmit="handleAuthSubmit(event, 'Signup')" class="w-full">
                        <input type="text" id="signup-fullname" placeholder="Full Name" class="auth-input" required oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')">
                        <input type="tel" id="signup-identifier" placeholder="Mobile number" class="auth-input" required maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <input type="text" id="signup-username" placeholder="Username" class="auth-input" required oninput="this.value = this.value.replace(/[^a-zA-Z0-9_]/g, '')">
                        <input type="email" id="signup-email" placeholder="E-mail" class="auth-input" required>
                        <input type="password" id="signup-password" placeholder="Set Password" class="auth-input" required>
                        
                        <button type="submit" class="btn-action-primary mt-2">Sign up</button>
                    </form>

                    <button type="button" onclick="switchAuthView('login')" class="btn-action-secondary mt-8">Already have an account? Log in</button>
                </div>

            </div>
            
            <!-- Message Box -->
            <div id="auth-message" class="mt-4 text-center text-sm font-semibold h-6 transition-all duration-300"></div>
        </div>
    </section>

    <script>
        function switchAuthView(targetView) {
            const loginView = document.getElementById('login-form-view');
            const signupView = document.getElementById('signup-form-view');
            const messageBox = document.getElementById('auth-message');
            
            messageBox.textContent = ''; // Clear message on switch

            if (targetView === 'signup') {
                loginView.classList.remove('is-active');
                setTimeout(() => { signupView.classList.add('is-active'); }, 300); 
            } else {
                signupView.classList.remove('is-active');
                setTimeout(() => { loginView.classList.add('is-active'); }, 300);
            }
        }

        const SUPABASE_URL = 'https://aybzziayodaybspnuxos.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable__YSi8eCD5W3QW1XN9uE08g_U8VHT3Ik';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleAuthSubmit(event, actionType) {
            event.preventDefault(); 
            
            const messageBox = document.getElementById('auth-message');
            messageBox.textContent = 'Processing...';
            messageBox.className = 'mt-4 text-center text-sm font-semibold h-6 text-yellow-500';

            // ================== SIGNUP LOGIC ==================
            if (actionType === 'Signup') {
                const fullName = document.getElementById('signup-fullname').value;
                const mobile = document.getElementById('signup-identifier').value;
                const username = document.getElementById('signup-username').value;
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;

                if (mobile.length < 10) {
                    messageBox.textContent = 'Mobile number must be 10 digits.';
                    messageBox.className = 'mt-4 text-center text-sm font-semibold h-6 text-red-500';
                    return;
                }

                try {
                    // 2. Sign up the user securely using Supabase Auth
                    const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                full_name: fullName,
                                mobile: mobile,
                                username: username
                            }
                        }
                    });

                    if (authError) throw authError;

                    // Strict check - If email exists, Supabase returns fake success without a user object
                    if (!authData || !authData.user) {
                        throw new Error("This email is already registered. Please log in.");
                    }

                    // 3. Save additional user data to a 'profiles' table in Database
                    const { error: dbError } = await supabaseClient
                        .from('profiles')
                        .insert([
                            {
                                id: authData.user.id,
                                full_name: fullName,
                                mobile: mobile,
                                username: username,
                                email: email
                            }
                        ]);
                        
                    // AGAR DATABASE MEIN KOI ERROR AAYA (JAISE COLUMN MISSING) TOH YE SCREEN PAR DIKHEGA
                    if (dbError) {
                        console.error("Database Insert Error:", dbError);
                        throw new Error("Database Error: " + dbError.message + " (Check table columns in Supabase)");
                    }

                    // Success Notification
                    messageBox.textContent = 'Sign up successful! You can now log in.';
                    messageBox.className = 'mt-4 text-center text-sm font-semibold h-6 text-green-500';
                    
                    // Clear the form fields
                    event.target.reset();

                    // Automatically switch to Login view after 2 seconds
                    setTimeout(() => {
                        messageBox.textContent = '';
                        switchAuthView('login');
                    }, 2000);

                } catch (error) {
                    console.error("Signup Workflow Error:", error);
                    messageBox.textContent = error.message;
                    messageBox.className = 'mt-4 text-center text-sm font-semibold h-6 text-red-500';
                }
                
            } else if (actionType === 'Login') {
                const identifier = document.getElementById('login-identifier').value;
                const password = document.getElementById('login-password').value;
                
                try {
                    let loginEmail = identifier;

                    // Step 1: If it's a mobile or username (doesn't contain @)
                    if (!identifier.includes('@')) {
                        const { data: profileData, error: profileError } = await supabaseClient
                            .from('profiles')
                            .select('email')
                            .or(`username.eq.${identifier},mobile.eq.${identifier}`)
                            .maybeSingle();

                        if (profileError || !profileData) {
                            throw new Error("Invalid Username or Mobile number.");
                        }
                        loginEmail = profileData.email; // Replace with actual email
                    }

                    // Step 2: Sign in
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: loginEmail, 
                        password: password,
                    });

                    if (error) throw new Error("Incorrect Password or Account not found.");

                    // Success
                    messageBox.textContent = 'Login successful! Redirecting to Home...';
                    messageBox.className = 'mt-4 text-center text-sm font-semibold h-6 text-green-500';
                    
                    setTimeout(() => window.location.href = 'home.html', 1500);

                } catch (error) {
                    messageBox.textContent = error.message;
                    messageBox.className = 'mt-4 text-center text-sm font-semibold h-6 text-red-500';
                }
            }
        }
    </script>
</body>
</html>
