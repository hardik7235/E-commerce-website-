<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhaga Piroi - Login & Signup</title>
    
    <!-- Supabase Integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body { 
            background-color: #fcf8f9; /* Soft brand background */
            color: #333333; 
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .split-layout {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .hero-section {
            width: 50%;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Layer 1: Final Background Image */
        .hero-bg-final {
            position: absolute;
            inset: 0;
            background: url('hero.jpeg') center/cover no-repeat;
            z-index: 1;
        }

        /* Layer 2: Initial Placeholder Texture (Crumpled Paper) */
        .hero-bg-intro {
            position: absolute;
            inset: 0;
            /* Custom Local Image */
            background: url('hero-intro.jpg') center/cover no-repeat;
            z-index: 2;
            animation: fadeOutIntro 1.5s ease-in-out 2.5s forwards;
        }

        /* Dark overlay to make text readable */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.6));
            z-index: 3;
        }

        .hero-content {
            position: relative;
            z-index: 4;
            text-align: center;
            color: #ffffff;
            padding: 40px;
        }

        /* Logo Animation - Disappears and collapses after 2.5s */
        .hero-logo {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 3px solid rgba(255, 255, 255, 0.9);
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both, fadeOutAndCollapse 1s ease-in-out 2.5s forwards;
            transform-origin: center;
        }

        /* Brand Title Animation */
        .hero-brand {
            font-family: 'Georgia', serif;
            font-size: 52px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
            animation: slideUpIntro 0.8s ease-out 0.4s both;
        }

        .hero-brand-highlight {
            color: #e7768b; /* Soft Pink Highlight for contrast */
        }

        /* Tagline appears AFTER the background changes (3.5s delay) */
        .hero-tagline {
            font-size: 20px;
            font-weight: 500;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            animation: slideUpTagline 0.8s ease-out 3.5s both;
        }

        /* Hero Keyframes */
        @keyframes fadeOutIntro { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
        @keyframes popIn { 
            0% { opacity: 0; transform: scale(0.5) translateY(40px); } 
            100% { opacity: 1; transform: scale(1) translateY(0); } 
        }
        @keyframes slideUpIntro { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUpTagline { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Smoothly remove logo and collapse its space to center the text */
        @keyframes fadeOutAndCollapse {
            0% { opacity: 1; width: 120px; height: 120px; margin-bottom: 20px; border-width: 3px; }
            40% { opacity: 0; transform: scale(0.8); width: 120px; height: 120px; margin-bottom: 20px; }
            100% { opacity: 0; transform: scale(0); width: 0px; height: 0px; margin-bottom: 0px; border-width: 0px; visibility: hidden; }
        }

        .auth-panel {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: #fcf8f9;
        }

        .form-container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 45px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(212, 93, 121, 0.08);
            border: 1px solid #f0e4e6;
        }

        .form-title {
            font-family: 'Georgia', serif;
            font-size: 32px;
            color: #222222;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Input Fields Matching Website Theme */
        .auth-input {
            width: 100%;
            padding: 16px 18px;
            margin-bottom: 16px;
            border: 2px solid #e8d5d8;
            border-radius: 8px;
            font-size: 15px;
            color: #333333;
            outline: none;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        .auth-input::placeholder { color: #aaaaaa; }
        .auth-input:focus { 
            border-color: #b84b63; 
            box-shadow: 0 0 0 3px rgba(212, 93, 121, 0.15); 
            background-color: #ffffff;
        }

        /* Action Buttons Matching 'Add to Cart' style */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background-color: #222222;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover { background-color: #d45d79; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 93, 121, 0.3); }
        .btn-primary:active { transform: translateY(0); }

        /* Divider & Links */
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #888888;
            font-size: 13px;
            text-transform: uppercase;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background-color: #f0e4e6; }
        .divider span { padding: 0 15px; }

        .switch-text { text-align: center; color: #666666; font-size: 15px; margin-top: 10px; }
        .switch-link { color: #d45d79; font-weight: bold; cursor: pointer; text-decoration: none; transition: color 0.3s; }
        .switch-link:hover { color: #b84b63; text-decoration: underline; }

        /* View Switching Logic */
        .form-view { display: none; animation: fadeInForm 0.4s ease; }
        .form-view.is-active { display: block; }
        @keyframes fadeInForm { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        /* Message Box */
        #auth-message {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            min-height: 20px;
            transition: all 0.3s;
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .hero-section { display: none; }
            .auth-panel { width: 100%; padding: 20px; }
            .form-container { padding: 35px 25px; }
        }
    </style>
</head>
<body>

    <div class="split-layout">
        
        <!-- LEFT SIDE: Cinematic Hero Section -->
        <section class="hero-section">
            <div class="hero-bg-final"></div>
            <div class="hero-bg-intro"></div>
            <div class="hero-overlay"></div>
            
            <div class="hero-content">
                <!-- Logo with popIn and fadeOutAndCollapse animation -->
                <img src="logo.png" alt="Dhaga Piroi Logo" class="hero-logo" onerror="this.style.display='none'">
                
                <h1 class="hero-brand">Dhaga <span class="hero-brand-highlight">Piroi</span></h1>
                <p class="hero-tagline">Handmade with Love, Threaded with Passion</p>
            </div>
        </section>

        <!-- RIGHT SIDE: Authentication Panel -->
        <section class="auth-panel">
            <div class="form-container">
                
                <!-- LOGIN FORM -->
                <div id="login-form-view" class="form-view is-active">
                    <h2 class="form-title">Login</h2>
                    
                    <form onsubmit="handleAuthSubmit(event, 'Login')">
                        <input type="text" id="login-identifier" placeholder="Mobile Number or E-mail" class="auth-input" required>
                        <input type="password" id="login-password" placeholder="Password" class="auth-input" required>
                        
                        <button type="submit" class="btn-primary">Log in</button>
                    </form>

                    <div class="divider"><span>or</span></div>

                    <p class="switch-text">New to Dhaga piroi? <span class="switch-link" onclick="switchAuthView('signup')">Sign up here</span></p>
                </div>

                <!-- SIGN UP FORM -->
                <div id="signup-form-view" class="form-view">
                    <h2 class="form-title">Signup</h2>
                    
                    <form onsubmit="handleAuthSubmit(event, 'Signup')">
                        <input type="text" id="signup-fullname" placeholder="Full Name" class="auth-input" required oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')">
                        <input type="tel" id="signup-identifier" placeholder="Mobile Number (10 Digits)" class="auth-input" required maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <input type="email" id="signup-email" placeholder="E-mail Address" class="auth-input" required>
                        <input type="password" id="signup-password" placeholder="Set Password" class="auth-input" required>
                        
                        <button type="submit" class="btn-primary">Sign up</button>
                    </form>

                    <div class="divider"><span>or</span></div>

                    <p class="switch-text">Already have an account? <span class="switch-link" onclick="switchAuthView('login')">Log in</span></p>
                </div>

                <!-- Message Box for Notifications -->
                <div id="auth-message"></div>

            </div>
        </section>
    </div>

    <script>
        function switchAuthView(targetView) {
            const loginView = document.getElementById('login-form-view');
            const signupView = document.getElementById('signup-form-view');
            document.getElementById('auth-message').textContent = '';

            if (targetView === 'signup') {
                loginView.classList.remove('is-active');
                setTimeout(() => { signupView.classList.add('is-active'); }, 150); 
            } else {
                signupView.classList.remove('is-active');
                setTimeout(() => { loginView.classList.add('is-active'); }, 150);
            }
        }

        const SUPABASE_URL = 'https://aybzziayodaybspnuxos.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable__YSi8eCD5W3QW1XN9uE08g_U8VHT3Ik';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleAuthSubmit(event, actionType) {
            event.preventDefault(); 
            
            const messageBox = document.getElementById('auth-message');
            messageBox.textContent = 'Processing...';
            messageBox.style.color = '#e0a800'; 

            if (actionType === 'Signup') {
                const fullName = document.getElementById('signup-fullname').value;
                const mobile = document.getElementById('signup-identifier').value;
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;

                if (mobile.length < 10) {
                    messageBox.textContent = 'Mobile number must be exactly 10 digits.';
                    messageBox.style.color = '#d45d79'; 
                    return;
                }

                try {
                    const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password,
                        options: { data: { full_name: fullName, mobile: mobile } }
                    });

                    if (authError) throw authError;

                    if (!authData || !authData.user) {
                        throw new Error("This email is already registered. Please log in.");
                    }

                    const { error: dbError } = await supabaseClient
                        .from('profiles')
                        .insert([{
                            id: authData.user.id,
                            full_name: fullName,
                            mobile: mobile,
                            email: email
                        }]);
                        
                    if (dbError) {
                        console.error("Database Insert Error:", dbError);
                        throw new Error("Database Error: " + dbError.message);
                    }

                    messageBox.textContent = 'Sign up successful! You can now log in.';
                    messageBox.style.color = '#28a745'; 
                    
                    event.target.reset();

                    setTimeout(() => {
                        messageBox.textContent = '';
                        switchAuthView('login');
                    }, 2000);

                } catch (error) {
                    messageBox.textContent = error.message;
                    messageBox.style.color = '#d45d79'; 
                }
                
            } else if (actionType === 'Login') {
                const identifier = document.getElementById('login-identifier').value;
                const password = document.getElementById('login-password').value;
                
                try {
                    let loginEmail = identifier;

                    if (!identifier.includes('@')) {
                        const { data: profileData, error: profileError } = await supabaseClient
                            .from('profiles')
                            .select('email')
                            .eq('mobile', identifier)
                            .maybeSingle();

                        if (profileError || !profileData) {
                            throw new Error("Invalid Mobile number.");
                        }
                        loginEmail = profileData.email; 
                    }

                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: loginEmail, 
                        password: password,
                    });

                    if (error) throw new Error("Incorrect Password or Account not found.");

                    messageBox.textContent = 'Login successful! Redirecting to Home...';
                    messageBox.style.color = '#28a745'; 
                    
                    setTimeout(() => window.location.href = 'home.html', 1500);

                } catch (error) {
                    messageBox.textContent = error.message;
                    messageBox.style.color = '#d45d79';
                }
            }
        }
    </script>
</body>
</html>
